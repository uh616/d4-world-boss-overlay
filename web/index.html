<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
        --bg: #0f0f11;
        --border: #8b0000;
        --wb: #ffcc00;
        --active: #ef4444;
        --idle: #a1a1aa;
        --text: #ffffff;
        --dim: #52525b;
    }

    body {
        font-family: 'Consolas', monospace;
        color: var(--text);
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 1px;
        gap: 2px;
    }

    .bar {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        height: 34px;
        padding: 0 10px;
        gap: 12px;
        width: fit-content;
        min-width: 150px;
        white-space: nowrap;
    }

    .logo-container {
        display: flex;
        align-items: center;
        -webkit-app-region: no-drag;
        cursor: pointer;
    }

    .logo {
        width: 22px;
        height: 22px;
        object-fit: contain;
    }

    .item {
        font-size: 12px;
        font-weight: bold;
    }
    
    #wb-val { color: var(--wb); }
    #ht-val { color: var(--active); }
    #lg-val { color: var(--active); }
    
    .divider {
        color: var(--dim);
        font-size: 12px;
        font-weight: bold;
    }

    .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        -webkit-app-region: no-drag;
        margin-left: 4px;
    }

    .btn {
        font-family: 'Segoe UI', system-ui, sans-serif;
        cursor: pointer;
        color: var(--dim);
        font-size: 12px;
        font-weight: bold;
        transition: color 0.15s;
    }

    .btn:hover { color: #ffffff; }
    #btn-close:hover { color: var(--active); }

    .locked .bar {
        border-color: var(--active) !important;
        /* Keep original background, do not make transparent */
    }
    .locked .controls { display: none; }

    #update-banner {
        display: none;
        background: rgba(20, 0, 0, 0.92);
        border-top: 1px solid #f59e0b;
        color: #f59e0b;
        font-size: 11px;
        font-family: 'Consolas', monospace;
        font-weight: bold;
        padding: 3px 6px;
        white-space: nowrap;
        -webkit-app-region: no-drag;
        animation: fadeSlide 0.4s ease;
        box-sizing: border-box;
        width: 100%;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    #update-banner-text { flex: 1; text-align: center; cursor: pointer; }
    #update-banner-text:hover { text-decoration: underline; }
    #update-banner-close {
        color: #a16207;
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
        padding: 0 2px;
        -webkit-app-region: no-drag;
        flex-shrink: 0;
    }
    #update-banner-close:hover { color: #f59e0b; }
    @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .map-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(220, 38, 38, 0.15);
        border: 1px solid rgba(220, 38, 38, 0.4);
        padding: 2px 8px;
        border-radius: 4px;
        color: #f87171 !important;
        transition: all 0.2s;
    }
    .map-btn:hover {
        background: rgba(220, 38, 38, 0.3);
        border-color: #ef4444;
        color: #fff !important;
    }
    .map-btn svg {
        width: 14px;
        height: 14px;
    }
</style>
</head>
<body>
<div id="app-container" style="display: flex; flex-direction: column; width: fit-content;">
    <div id="update-banner" style="display: none; position: relative;">
        <span>Update available: </span><a href="https://github.com/uh616/d4-world-boss-overlay/releases/latest" id="update-link" target="_blank">v...</a>
        <span class="close-update" style="cursor:pointer; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #ff6b6b;" title="Dismiss" onclick="document.getElementById('update-banner').style.display='none'">✕</span>
    </div>
<div class="bar" id="main-bar">
    <div class="logo-container" ondblclick="toggleMini()" onclick="toggleMini()">
        <img src="../logo.png" class="logo" alt="Logo">
    </div>

    <div class="item" id="wb-container">
        <span id="wb-val">Loading...</span>
    </div>
    
    <div class="divider" id="div-1">║</div>

    <div class="item" id="ht-container">
        <span id="ht-val">HT: ...</span>
    </div>

    <div class="divider" id="div-2">║</div>

    <div class="item" id="lg-container">
        <span id="lg-val">LG: ...</span>
    </div>

    <div class="controls">
        <div class="btn map-btn" onclick="toggleMap()" title="Open Helltide Map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
            <span>Map</span>
        </div>
        <div class="btn" id="btn-settings" onclick="openSettings()" title="Settings">⚙</div>
        <div class="btn" id="btn-close" onclick="closeApp()" title="Close">✕</div>
    </div>
</div>

<div id="update-banner">
    <span id="update-banner-text" onclick="openUpdateLink()"></span>
    <span id="update-banner-close" onclick="closeBanner()" title="Dismiss">✕</span>
</div>
</div>

<script>
    let config = {};
    let miniMode = false;
    let cachedApiData = null;

    function formatTime(ev) {
        if (!ev) return "--:--";
        let rem = ev.time - (Date.now() / 1000);
        if (rem < 0 && ev.type === "helltide") rem += (55 * 60);
        if (rem < 0) return "--:--";
        const m = Math.floor(rem / 60);
        const s = Math.floor(rem % 60);
        if (m > 99) return `${Math.floor(m / 60)}h ${(m % 60).toString().padStart(2, '0')}m`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function applyConfig() {
        if(config.theme) {
            const THEMES = {
                "Default Crimson": {"wb": "#ffcc00", "active": "#ef4444", "idle": "#a1a1aa", "border": "#8b0000"},
                "Neon Blue":       {"wb": "#38bdf8", "active": "#818cf8", "idle": "#94a3b8", "border": "#1e3a8a"},
                "Gold":            {"wb": "#fde047", "active": "#f59e0b", "idle": "#d6d3d1", "border": "#b45309"}
            };
            const t = THEMES[config.theme] || THEMES["Default Crimson"];
            document.documentElement.style.setProperty('--border', t.border);
            document.documentElement.style.setProperty('--wb', t.wb);
            document.documentElement.style.setProperty('--active', t.active);
            document.documentElement.style.setProperty('--idle', t.idle);
        }
        if (config.opacity !== undefined) document.body.style.opacity = config.opacity;

        // Apply font size
        const fs = config.font_size || 12;
        document.querySelectorAll('.item').forEach(el => el.style.fontSize = fs + 'px');
        // Scale bar height to font
        const barH = Math.max(30, fs * 2.6);
        document.getElementById('main-bar').style.height = barH + 'px';
        document.getElementById('main-bar').style.borderRadius = '6px'; // Keep it rectangular
        setTimeout(() => {
            const container = document.getElementById('app-container');
            if (window.electronAPI && container) window.electronAPI.resizeWindow(container.offsetWidth + 10, Math.round(barH) + 4);
        }, 10);

        const show_wb = config.show_boss !== false;
        const show_ht = config.show_helltide !== false;
        const show_lg = config.show_legion !== false;

        document.getElementById('wb-container').style.display = show_wb ? 'flex' : 'none';
        document.getElementById('ht-container').style.display = show_ht ? 'flex' : 'none';
        document.getElementById('lg-container').style.display = show_lg ? 'flex' : 'none';
        
        document.getElementById('div-1').style.display = (show_wb && (show_ht || show_lg) && !miniMode) ? 'block' : 'none';
        document.getElementById('div-2').style.display = (show_ht && show_lg && !miniMode) ? 'block' : 'none';

        // Re-render UI immediately to adjust to new modes
        renderData();
    }

    function renderData() {
        if (!cachedApiData) return;
        
        const data = cachedApiData;
        const wb = document.getElementById('wb-val');
        const ht = document.getElementById('ht-val');
        const lg = document.getElementById('lg-val');

        const fWB = formatTime(data.boss);
        const fHT = formatTime(data.helltide);
        const fLG = formatTime(data.legion);

        wb.textContent = miniMode ? `👹 ${fWB}` : `WB ${fWB}`;
        ht.textContent = miniMode ? `🔥 ${fHT}` : `HT ${fHT}`;
        lg.textContent = miniMode ? `⚡ ${fLG}` : `LG ${fLG}`;
        
        // Colors
        ht.style.color = fHT === "--:--" ? 'var(--idle)' : 'var(--active)';
        lg.style.color = fLG === "--:--" ? 'var(--idle)' : 'var(--active)';

        // Resize the window dynamically ONLY if width changed
        setTimeout(() => {
            const container = document.getElementById('app-container');
            if (!container) return;
            const w = container.offsetWidth + 10;
            if (window.lastWidth !== w) {
                window.lastWidth = w;
                if (window.electronAPI) window.electronAPI.resizeWindow(w);
            }
        }, 10);

        checkAlerts(data);
    }

    let alertedEvents = {};

    function checkAlerts(data) {
        if (!data) return;
        const alertMin = config.alert_minutes || 5;
        const now = Date.now() / 1000;
        
        function check(ev, isEnabled, key) {
            if (!ev || !isEnabled) return;
            let rem = ev.time - now;
            if (rem < 0 && ev.type === "helltide") rem += (55 * 60);
            
            // If event is exactly alertMin minutes away (within a 2-second window to prevent multi-trigger)
            const targetSec = alertMin * 60;
            if (rem <= targetSec && rem > targetSec - 2) {
                const eventId = ev.type + '_' + ev.time;
                if (!alertedEvents[eventId]) {
                    alertedEvents[eventId] = true;
                    if (window.electronAPI && window.electronAPI.testSound) {
                        window.electronAPI.testSound();
                    }
                }
            }
        }

        check(data.boss, config.sound_wb, "wb");
        check(data.helltide, config.sound_ht, "ht");
        check(data.legion, config.sound_legion, "lg");
    }

    function setLocked(locked) {
        if(locked) {
            document.body.classList.add('locked');
            document.getElementById('main-bar').style.setProperty('-webkit-app-region', 'no-drag');
        } else {
            document.body.classList.remove('locked');
            document.getElementById('main-bar').style.setProperty('-webkit-app-region', 'drag');
        }
    }

    function openSettings() {
        if(window.electronAPI) window.electronAPI.openSettings();
    }

    function toggleMap() {
        if(window.electronAPI) window.electronAPI.toggleMap();
    }

    function closeApp() {
        if(window.electronAPI) window.electronAPI.closeOverlay();
    }

    function openUpdateLink() {
        if (window._updateUrl && window.electronAPI) {
            window.electronAPI.openUrl(window._updateUrl);
        }
    }

    function closeBanner() {
        const banner = document.getElementById('update-banner');
        if (banner) {
            banner.style.display = 'none';
            setTimeout(() => {
                const container = document.getElementById('app-container');
                const bar = document.getElementById('main-bar');
                if (window.electronAPI && container && bar) {
                    window.lastWidth = container.offsetWidth + 10;
                    window.electronAPI.resizeWindow(window.lastWidth, bar.offsetHeight + 4);
                }
            }, 10);
        }
    }

    function toggleMini() {
        if (document.body.classList.contains('locked')) return;
        miniMode = !miniMode;
        applyConfig(); 
    }

    window.addEventListener('DOMContentLoaded', async () => {
        if (window.electronAPI) {
            const cfg = await window.electronAPI.getConfig();
            config = JSON.parse(cfg);
            applyConfig();

            window.electronAPI.onApiUpdate((data) => {
                cachedApiData = data;
                renderData();
            });

            window.electronAPI.onConfigChanged((cfg) => {
                config = JSON.parse(cfg);
                applyConfig();
            });

            window.electronAPI.onLockChanged((locked) => {
                setLocked(locked);
            });

            window.electronAPI.onPlayAudio((data) => {
                try {
                    const audio = new Audio(data.dataUri);
                    audio.volume = Math.max(0, Math.min(1, data.volume / 100.0));
                    audio.play().catch(e => console.error("Audio playback error:", e));
                } catch(e) {
                    console.error("Audio creation error:", e);
                }
            });

            window.electronAPI.onUpdateAvailable((data) => {
                const banner = document.getElementById('update-banner');
                if (banner) {
                    window._updateUrl = data.url;
                    // remove "v" if already present in tag
                    const verText = data.version.startsWith('v') ? data.version : 'v' + data.version;
                    document.getElementById('update-banner-text').textContent = `⬆ ${verText} available — click to update`;
                    banner.style.display = 'flex';
                    setTimeout(() => {
                        const container = document.getElementById('app-container');
                        const bar = document.getElementById('main-bar');
                        if (window.electronAPI && container && bar) {
                            window.lastWidth = container.offsetWidth + 10;
                            window.electronAPI.resizeWindow(window.lastWidth, bar.offsetHeight + 24);
                        }
                    }, 10);
                }
            });
        } else {
            // STANDALONE MODE (OBS / GitHub Pages)
            document.querySelector('.controls').style.display = 'none'; // hide controls
            document.body.style.backgroundColor = 'transparent';
            
            try {
                const stored = localStorage.getItem('d4config');
                if (stored) config = JSON.parse(stored);
            } catch(e) {}
            applyConfig();

            async function fetchApi() {
                try {
                    const res = await fetch('http://localhost:4321');
                    cachedApiData = await res.json();
                    renderData();
                } catch(e) { 
                    // If local server is down, we silently wait
                }
            }
            fetchApi();
            setInterval(fetchApi, 1000); // Fetch locally every 1 second for perfect sync
        }
        
        // Timer tick to update seconds visually every second without hitting API
        setInterval(renderData, 1000);
    });
</script>
</body>
</html>
